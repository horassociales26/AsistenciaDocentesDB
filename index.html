<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Asistencia Docente</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <div id="login-container" class="container">
        <h2>Acceso de Administrador</h2>
        <p class="subtitle">Ingrese sus credenciales para gestionar el sistema</p>
        <input type="email" id="email" placeholder="Correo electrónico" required autocomplete="email">
        <input type="password" id="password" placeholder="Contraseña" required>
        <button id="btn-login" class="btn-primary" style="width: 100%; padding: 12px;">Iniciar Sesión</button>
        <p id="login-msg" style="color: #e74c3c; margin-top: 10px; font-weight: bold;"></p>
    </div>

    <div id="kiosco-container" class="container hidden">
        <h2>Registro de Asistencia</h2>
        
        <div id="bloque-ingreso">
            <p class="subtitle">Docentes: Digiten su código asignado</p>
            <input type="text" id="pin-input" maxlength="3" autocomplete="off" autofocus placeholder="***">
            <button id="btn-marcar" class="btn-primary" style="width: 100%; padding: 15px; font-size: 18px;">Verificar PIN</button>
        </div>

        <div id="bloque-confirmacion" class="hidden" style="background-color: #f8f9fa; padding: 25px; border-radius: 8px; border: 1px solid #bdc3c7;">
            <p style="color: #7f8c8d; font-size: 15px;">Confirmación de identidad:</p>
            <h3 id="nombre-confirmacion" style="color: #2c3e50; margin: 15px 0; font-size: 24px;"></h3>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="btn-si" class="btn-success" style="width: 130px; padding: 12px;">Sí, confirmar</button>
                <button id="btn-no" class="btn-danger" style="width: 130px; padding: 12px;">Cancelar</button>
            </div>
        </div>

        <div id="tarjeta-exito" class="hidden" style="background: #2ecc71; color: white; padding: 25px; border-radius: 12px; box-shadow: 0 8px 15px rgba(46,204,113,0.3); margin-top: 15px;">
            <h3 id="exito-nombre" style="font-size: 22px; margin-bottom: 5px;"></h3>
            <p id="exito-hora" style="font-size: 16px; font-weight: bold;"></p>
        </div>
        
        <div id="status-msg" class="msg-status"></div>

        <hr style="border: 0; height: 1px; background: #eee; margin: 25px 0;">
        <div style="display: flex; justify-content: space-between;">
            <button id="btn-ir-admin" class="btn-tab" style="font-weight: 600;">Panel Maestro</button>
            <button id="btn-logout" class="btn-danger" style="background: transparent; color: #e74c3c; border: 1px solid #e74c3c;">Cerrar Sesión</button>
        </div>
    </div>

    <div id="admin-container" class="container wide hidden">
        <h2 style="text-align: left; margin-bottom: 20px;">Panel Maestro de Gestión</h2>
        
        <div class="admin-menu">
            <button id="tab-reporte" class="btn-tab active-tab">Matriz General</button>
            <button id="tab-nuevo" class="btn-tab">Agregar Docente</button>
        </div>

        <div id="sec-reporte" class="admin-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 15px;">
                <input type="text" id="buscador-docente" placeholder="Buscar por nombre o PIN..." style="width: 100%; max-width: 400px; margin-bottom: 0;">
                <button id="btn-exportar-csv" class="btn-success">Exportar a Excel</button>
            </div>
            
            <div id="tabla-excel-container" class="table-wrapper"></div>
            
            <div style="width: 100%; max-width: 350px; margin: 20px auto 0 auto;">
                <canvas id="grafica-asistencia"></canvas>
            </div>
        </div>

        <div id="sec-nuevo" class="admin-section hidden" style="max-width: 500px; margin: 0 auto;">
            <h3 class="subtitle">Registrar Nuevo Docente en el Sistema</h3>
            <input type="text" id="nuevo-nombres" placeholder="Nombres" required autocomplete="off">
            <input type="text" id="nuevo-apellidos" placeholder="Apellidos" required autocomplete="off">
            <button id="btn-guardar-docente" class="btn-primary" style="width: 100%; padding: 12px;">Guardar y Generar PIN</button>
            <div id="admin-msg" class="msg-status"></div>
        </div>

        <hr style="border: 0; height: 1px; background: #eee; margin: 20px 0;">
        <button id="btn-volver-kiosco" class="btn-tab" style="width: 100%;">Volver al Kiosco de Entrada</button>
    </div>

    <div id="modal-edicion" class="modal-overlay hidden">
        <div class="modal-card">
            <h3 style="color: var(--dark); margin-bottom: 15px; font-size: 22px;">Gestión de Docente</h3>
            <input type="hidden" id="edit-id">
            
            <div style="text-align: left; margin-bottom: 20px;">
                <label class="modal-label">Apellidos:</label>
                <input type="text" id="edit-apellidos" class="modal-input" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px;">
                
                <label class="modal-label">Nombres:</label>
                <input type="text" id="edit-nombres" class="modal-input" style="width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border); border-radius: 6px;">

                <label class="modal-label">Estado en el Sistema:</label>
                <select id="edit-estado" class="modal-input" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid var(--border); font-weight: 600;">
                    <option value="true">Activo (Permite marcar asistencia)</option>
                    <option value="false">Inactivo (Bloquea acceso al kiosco)</option>
                </select>
            </div>

            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <button id="btn-guardar-edicion" class="btn-primary" style="flex: 2;">Guardar Cambios</button>
                <button id="btn-eliminar-docente" class="btn-danger" style="flex: 1;">Eliminar</button>
            </div>
            <button id="btn-cerrar-modal" class="btn-tab" style="width: 100%; border: 1px solid var(--border);">Cancelar</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
